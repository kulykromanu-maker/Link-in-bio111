<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hachiiiroku</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;700;800&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#050814;
    --bg-mid:#050b30;
    --neon-blue:#1f2fc4;
    --neon-blue-soft:#3b4ed6;
    --neon-white:#ffffff;
    --card-white:#f5f7ff;
    --ink-black:#0b0c10;
    --support-black:#08090c;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    min-height:100%;
    background:var(--bg-deep);
    font-family:'Manrope',sans-serif;
    color:var(--ink-black);
    overflow-x:hidden;
  }

  body{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
    padding:56px 18px 40px;
    position:relative;
  }

  /* ambient neon background */
  .aura{
    position:fixed;
    inset:0;
    z-index:0;
    background:
      radial-gradient(circle at 20% 15%, rgba(31,47,196,0.35), transparent 45%),
      radial-gradient(circle at 85% 20%, rgba(59,78,214,0.28), transparent 50%),
      radial-gradient(circle at 50% 90%, rgba(31,47,196,0.30), transparent 55%),
      linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mid) 55%, var(--bg-deep) 100%);
    animation:drift 14s ease-in-out infinite alternate;
  }
  @keyframes drift{
    0%{filter:brightness(1) saturate(1);}
    100%{filter:brightness(1.12) saturate(1.15);}
  }

  .grid-overlay{
    position:fixed;
    inset:0;
    z-index:0;
    opacity:0.08;
    background-image:
      linear-gradient(rgba(59,78,214,0.6) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,78,214,0.6) 1px, transparent 1px);
    background-size:48px 48px;
    mask-image:radial-gradient(circle at 50% 30%, black 0%, transparent 70%);
  }

  .page{
    position:relative;
    z-index:1;
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* avatar + name */
  .avatar-wrap{
    width:132px;
    height:132px;
    border-radius:50%;
    padding:4px;
    background:var(--bg-deep);
    box-shadow:
      0 0 0 2px rgba(255,255,255,0.9),
      0 0 18px 2px rgba(255,255,255,0.55),
      0 0 46px 10px rgba(59,78,214,0.55);
    animation:pulseAvatar 3.6s ease-in-out infinite;
    margin-bottom:22px;
  }
  @keyframes pulseAvatar{
    0%,100%{
      box-shadow:
        0 0 0 2px rgba(255,255,255,0.9),
        0 0 18px 2px rgba(255,255,255,0.5),
        0 0 46px 10px rgba(59,78,214,0.5);
    }
    50%{
      box-shadow:
        0 0 0 2px rgba(255,255,255,1),
        0 0 26px 4px rgba(255,255,255,0.8),
        0 0 64px 16px rgba(59,78,214,0.75);
    }
  }
  .avatar-wrap img{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    display:block;
  }

  .nickname{
    font-family:'Exo 2',sans-serif;
    font-weight:800;
    font-size:26px;
    letter-spacing:0.5px;
    color:var(--neon-white);
    text-align:center;
    margin:0 0 34px;
    text-shadow:
      0 0 6px rgba(255,255,255,0.9),
      0 0 18px rgba(255,255,255,0.6),
      0 0 40px rgba(59,78,214,0.6);
    animation:pulseText 3.6s ease-in-out infinite;
  }
  @keyframes pulseText{
    0%,100%{ text-shadow:0 0 6px rgba(255,255,255,0.85), 0 0 18px rgba(255,255,255,0.55), 0 0 40px rgba(59,78,214,0.55); }
    50%{ text-shadow:0 0 10px rgba(255,255,255,1), 0 0 26px rgba(255,255,255,0.85), 0 0 56px rgba(59,78,214,0.8); }
  }

  .tagline{
    font-family:'Manrope',sans-serif;
    font-weight:600;
    font-size:13px;
    letter-spacing:2.5px;
    text-transform:uppercase;
    color:var(--neon-blue-soft);
    margin:0 0 34px;
    text-shadow:0 0 12px rgba(59,78,214,0.7);
  }

  /* cards */
  .links{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:16px;
  }

  .card{
    display:flex;
    align-items:center;
    gap:14px;
    width:100%;
    padding:14px 20px;
    border-radius:18px;
    background:var(--card-white);
    text-decoration:none;
    color:var(--ink-black);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.6) inset,
      0 0 16px 2px rgba(255,255,255,0.35),
      0 0 34px 6px rgba(59,78,214,0.35);
    transition:transform .22s ease, box-shadow .22s ease;
  }
  .card:hover{
    transform:translateY(-3px);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.8) inset,
      0 0 22px 4px rgba(255,255,255,0.55),
      0 0 50px 10px rgba(59,78,214,0.55);
  }
  .card:active{ transform:translateY(-1px); }

  .icon{
    flex:0 0 auto;
    width:40px;
    height:40px;
    border-radius:11px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .card-text{
    font-family:'Manrope',sans-serif;
    font-weight:700;
    font-size:16px;
    color:var(--ink-black);
    letter-spacing:0.2px;
  }
  .card-sub{
    display:block;
    font-weight:500;
    font-size:12.5px;
    color:#4a4d57;
    margin-top:1px;
  }

  /* support the author — inverted card */
  .card.support-author{
    background:var(--support-black);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.25) inset,
      0 0 16px 2px rgba(255,255,255,0.4),
      0 0 34px 6px rgba(59,78,214,0.4);
    margin-top:6px;
  }
  .card.support-author:hover{
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.4) inset,
      0 0 22px 4px rgba(255,255,255,0.6),
      0 0 50px 10px rgba(59,78,214,0.6);
  }
  .card.support-author .card-text{ color:var(--neon-white); }
  .card.support-author .card-sub{ color:rgba(255,255,255,0.6); }
  .card.support-author .icon{ background:rgba(255,255,255,0.08); }

  /* bottom row */
  .bottom-row{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:30px;
  }

  .mini-avatar{
    width:56px;
    height:56px;
    border-radius:50%;
    padding:3px;
    background:var(--bg-deep);
    box-shadow:
      0 0 0 2px rgba(255,255,255,0.9),
      0 0 14px 2px rgba(255,255,255,0.5),
      0 0 30px 6px rgba(59,78,214,0.5);
    text-decoration:none;
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .mini-avatar:hover{ transform:translateY(-2px); }
  .mini-avatar img{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    display:block;
  }

  .support-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    height:56px;
    padding:0 22px;
    border-radius:999px;
    background:rgba(10,20,64,0.55);
    backdrop-filter:blur(6px);
    text-decoration:none;
    font-family:'Manrope',sans-serif;
    font-weight:700;
    font-size:14px;
    color:var(--neon-white);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.5) inset,
      0 0 14px 2px rgba(255,255,255,0.4),
      0 0 30px 6px rgba(59,78,214,0.45);
    text-shadow:0 0 10px rgba(255,255,255,0.7);
    transition:transform .2s ease, box-shadow .2s ease;
    white-space:nowrap;
  }
  .support-btn:hover{
    transform:translateY(-2px);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.7) inset,
      0 0 20px 4px rgba(255,255,255,0.6),
      0 0 44px 10px rgba(59,78,214,0.6);
  }
  .support-btn svg{ width:16px; height:16px; flex:0 0 auto; }

  footer{
    position:relative;
    z-index:1;
    margin-top:38px;
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:rgba(255,255,255,0.28);
    text-align:center;
  }

  @media (max-width:380px){
    .nickname{ font-size:22px; }
    .card-text{ font-size:14.5px; }
    .support-btn{ height:48px; padding:0 16px; font-size:12.5px; }
    .mini-avatar{ width:48px; height:48px; }
  }

  @media (prefers-reduced-motion: reduce){
    .avatar-wrap, .nickname, .aura{ animation:none !important; }
  }
</style>
</head>
